<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Paciente - Unimed</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="login-page">
    <div class="login-card">
      <header class="login-header">
        <span class="login-header__icon">🏥</span>
        <h1>Portal do Paciente</h1>
        <p>Unimed</p>
      </header>

      <form class="login-form">
        <div class="form-group">
          <label for="carteirinha">Carteirinha</label>
          <input type="text" id="carteirinha" placeholder="Digite sua carteirinha" required />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha" required />
        </div>

        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <p class="login-hint">
        Carteirinha: <strong>0089234000012</strong> | Senha:
        <strong>123456</strong>
      </p>
    </div>
  </main>
</body>

</html>
